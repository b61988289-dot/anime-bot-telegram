services:
  - type: worker
    name: dorama-ai-bot
    env: node
    region: oregon
    plan: free
    buildCommand: npm install && npm run build
    startCommand: node dist/index.mjs
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_ADMIN_ID
        sync: false
      - key: DID_API_KEY
        sync: false
      - key: PIX_KEY
        sync: false
      - key: TONCOIN_ADDRESS
        sync: false
      - key: VIP_PRICE_BRL
        value: "29.90"
      - key: VIP_PRICE_TON
        value: "2.5"
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
